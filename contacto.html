<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - PvZ Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="index.html">🌱 PvZ Market</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="plantas.html">Plantas</a></li>
                    <li class="nav-item"><a class="nav-link" href="zombies.html">Zombies</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="contacto.html">Contacto</a></li>
                    <button class="btn btn-warning position-relative" data-bs-toggle="modal"
                            data-bs-target="#cartModal">
                            🛒 Carrito
                            <span id="cart-count"
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                        </button>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Habla con Dave el Loco</h1>
            <p class="lead">¿Problemas con tu mascota? ¿Alguien se comió tu cerebro? ¡Escríbenos, porque estoy LOCOOO!</p>
        </div>
    </header>

    <!--Empieza el formulario  -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow-lg border-0 contacto-card">
                    <div class="card-body p-5">
                        <h3 class="mb-4 fw-bold text-center text-dark">Envíanos un mensaje</h3>
                        
                        <!--Nombre -->
                        <form action="#" method="POST" id="formMensaje " onsubmit="return validaFormulario()">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="nombre" class="form-label fw-bold">Nombre Completo</label>
                                    <input type="text" class="form-control" id="nombre" placeholder="Ej. Juan Pérez" required>
                                </div>
                                <!--Correo  -->
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label fw-bold">Correo Electrónico</label>
                                    <input type="email" class="form-control" id="email" placeholder="tucorreo@ejemplo.com" required>
                                </div>
                            </div>

                            <!--Bando  -->
                            <div class="mb-3">
                                <label for="bando" class="form-label fw-bold">¿Qué bando prefieres?</label>
                                <select class="form-select" id="bando">
                                    <option value="" selected disabled>Selecciona una opción...</option>
                                    <option value="plantas">Definitivamente Plantas 🌻</option>
                                    <option value="zombies">Soy equipo Zombies 🧟‍♂️</option>
                                    <option value="ambos">Me gustan ambos bandos</option>
                                    <option value="tacos">Invitale a Héctor Tacos y Caguamas 🌮</option>
                                </select>
                            </div>
                            
                            <!--Mensaje  -->
                            <div class="mb-4">
                                <label for="mensaje" class="form-label fw-bold">Tu Mensaje</label>
                                <textarea class="form-control" id="mensaje" rows="5" placeholder="Escribe aquí tu duda, queja o sugerencia de jardinería..." required></textarea>
                            </div>
                            
                            <!--Botton para enviar  -->
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success btn-lg fw-bold">
                                    Enviar Mensaje 📬
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">© 2026 PvZ Pet Shop - Desarrollado por Elio con el poder de los tacos.</p>
        </div>
    </footer>

   
</body>
</html>
